schema_name: hermes_research_dashboard
schema_version: 2
status: template
purpose: >-
  Define Chan's public-repo-safe, read-only Hermes dashboard contract for v2
  research projects. The dashboard surfaces phase, gate, blocker, lane, and
  milestone state. It does not make research decisions, cross gates, nudge
  workers, edit project repos, or replace repo-local QA files.

scope:
  owner: hermes
  mode: read_only
  source_of_truth:
    project_state: project_state.md
    gate_status: qa/gate_status.yaml
    next_actions: next_actions.md
    decision_log: decision_log.md
    agent_status: AGENT_STATUS.md
    git_log: git log
  forbidden_actions:
    - edit_project_repo
    - cross_human_gate
    - infer_gate_pass_from_notification_text
    - expose_private_tokens_or_chat_ids
    - trigger_live_external_side_effects

refresh:
  timezone: Asia/Seoul
  interval_minutes: 10
  stdout_policy: silent_unless_critical

dashboard:
  write_path: ~/.research_system/global_dashboard.md

project_row:
  required_fields:
    project_repo_name:
      type: string
      description: Repository or project slug shown in the global dashboard.
    current_phase:
      type: string
      description: Current v2 phase or project phase read from project state or gate status.
    last_commit_time:
      type: datetime
      description: Timestamp of the latest project commit visible to Hermes.
    last_commit_message:
      type: string
      description: Subject line of the latest project commit visible to Hermes.
    gate_status_summary:
      type: object
      allowed_states:
        - passing
        - blocked
        - pending
      description: Map each relevant gate to exactly one allowed state.
    attention_level:
      type: integer
      allowed_values:
        - 0
        - 1
        - 2
        - 3
      value_labels:
        0: normal
        1: human_gate_ready
        2: stuck_24h
        3: escalation
      description: Numeric attention level used for dashboard sorting and briefing priority.
    blocker_summary:
      type: string
      description: Concise blocker text, or empty string when no blocker is present.
    open_human_gates:
      type: array
      allowed_values:
        - gate_4
        - gate_6
      allowed_combinations:
        - []
        - [gate_4]
        - [gate_6]
        - [gate_4, gate_6]
      description: Human gates currently open; only gate_4, gate_6, or both are valid.
    active_lanes:
      type: array
      item_type: string
      description: Active agent, tmux, or execution lanes visible from repo-local state.
    next_expected_milestone:
      type: string
      description: Next expected milestone from next actions or gate status.
    stuck_duration_hours:
      type: number
      minimum: 0
      description: Hours since the project first entered the current stuck state.

notification_mapping:
  critical_if:
    - attention_level_is_1_human_gate_ready
    - attention_level_is_3_escalation
  digest_if:
    - attention_level_is_2_stuck_24h
    - attention_level_is_0_with_state_change
  silent_if:
    - attention_level_is_0_without_state_change

rendering:
  markdown_table:
    columns:
      - project_repo_name
      - current_phase
      - last_commit_time
      - last_commit_message
      - gate_status_summary
      - attention_level
      - blocker_summary
      - open_human_gates
      - active_lanes
      - next_expected_milestone
      - stuck_duration_hours
  max_cell_chars: 500
  sanitize:
    replace_pipe_with: /
    collapse_whitespace: true

privacy:
  public_repo_safe: true
  placeholders_only: true
  must_not_include:
    - bot_tokens
    - chat_ids
    - slack_channel_ids
    - webhook_urls
    - credentials
    - private_api_keys

morning_briefing_aggregation_rule: >-
  During the 09:00-12:00 KST morning briefing window, Hermes aggregates rows
  from ~/.research_system/global_dashboard.md by descending attention_level and
  then by descending stuck_duration_hours, listing projects with open_human_gates
  or blocked gate_status_summary entries before normal projects.
